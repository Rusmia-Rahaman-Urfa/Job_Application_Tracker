<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">
    <header class="max-w-5xl mx-auto mb-10">
        <h1 class="text-2xl font-bold text-blue-900 mb-8">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-md shadow-sm border border-gray-200">
                <p class="text-gray-400 text-xs uppercase font-bold tracking-wider">Total </p>
                <h2 id="stats-total" class="text-2xl font-black text-blue-900">0</h2>
            </div>
            <div class="bg-white p-5 rounded-md shadow-sm border border-gray-200">
                <p class="text-emerald-500 text-xs uppercase font-bold tracking-wider">Interview</p>
                <h2 id="stats-interview" class="text-2xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-md shadow-sm border border-gray-200">
                <p class="text-red-400 text-xs uppercase font-bold tracking-wider">Rejected</p>
                <h2 id="stats-rejected" class="text-2xl font-black text-red-500">0</h2>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-semibold text-slate-800">Available Jobs</h3>
            <span class="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-xs font-bold">
                <span id="display-count">0</span> Jobs
            </span>
        </div>
        <div role="tablist" class="tabs tabs-lifted mb-10">
            <a role="tab" class="tab tab-active" onclick="changeCategory('all', this)">All</a>
            <a role="tab" class="tab" onclick="changeCategory('interview', this)">Interview</a>
            <a role="tab" class="tab" onclick="changeCategory('rejected', this)">Rejected</a>
        </div>
        <div id="main-job-list" class="grid gap-5"></div>
    </main>

    <script src="job.js"></script>
</body>
</html>
