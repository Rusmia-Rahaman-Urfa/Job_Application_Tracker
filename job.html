<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Job Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10">
    <header class="max-w-5xl mx-auto mb-10">
        <h1 class="text-2xl font-bold text-blue-900 mb-8">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-5 rounded-md shadow-sm border border-gray-200">
                <p class="text-gray-400 text-xs uppercase font-bold tracking-wider">Total </p>
                <h2 id="stats-total" class="text-2xl font-black text-blue-900">0</h2>
            </div>
            <div class="bg-white p-5 rounded-md shadow-sm border border-gray-200">
                <p class="text-emerald-500 text-xs uppercase font-bold tracking-wider">Interview</p>
                <h2 id="stats-interview" class="text-2xl font-black text-emerald-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-md shadow-sm border border-gray-200">
                <p class="text-red-400 text-xs uppercase font-bold tracking-wider">Rejected</p>
                <h2 id="stats-rejected" class="text-2xl font-black text-red-500">0</h2>
            </div>
        </div>
    </header>
    <main class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-slate-800">Available Jobs</h3>
        <span class="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-xs font-bold border border-blue-100">
            <span id="display-count">0</span> Jobs
        </span>
    </div>

    <div class="inline-flex p-1 bg-white border border-gray-200 rounded-lg mb-10 overflow-hidden">
        <button class="tab-btn px-8 py-2 text-sm font-medium rounded-md transition-all bg-blue-600 text-white" 
                onclick="changeCategory('all', this)">All</button>
        <button class="tab-btn px-8 py-2 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-700" 
                onclick="changeCategory('interview', this)">Interview</button>
        <button class="tab-btn px-8 py-2 text-sm font-medium rounded-md transition-all text-slate-500 hover:text-slate-700" 
                onclick="changeCategory('rejected', this)">Rejected</button>
    </div>

    <div id="main-job-list" class="grid gap-6">
        </div>
</main>

    <script src="job.js"></script>
</body>
</html>
